# docker-compose.e2e.yml
services:
  postgres_e2e:
    image: postgres:13
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=tododb_e2e
    volumes:
      - postgres_e2e_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d tododb_e2e"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend_e2e:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres_e2e/tododb_e2e
      - SECRET_KEY=e2e-test-secret-key
    depends_on:
      postgres_e2e:
        condition: service_healthy
    restart: unless-stopped

  frontend_e2e:
    build:
      context: ./frontend
      target: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_TIMELINE_FEATURE_FLAG=true
    command: npm start
    depends_on:
      - backend_e2e

volumes:
  postgres_e2e_data:
